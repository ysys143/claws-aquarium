[meta]
name = "use-case-v2-cloud"
description = "5 use-case benchmarks x 6 cloud models"

[defaults]
temperature = 0.0
max_tokens = 4096

[judge]
model = "gpt-5-mini"

[run]
max_workers = 4
output_dir = "results/use-cases-v2-cloud/"
seed = 42

[[models]]
name = "claude-opus-4-6"
engine = "cloud"

[[models]]
name = "claude-haiku-4-5"
engine = "cloud"

[[models]]
name = "gemini-3.1-pro-preview"
engine = "cloud"

[[models]]
name = "gemini-3.1-flash-lite-preview"
engine = "cloud"

[[models]]
name = "gpt-5.4"
engine = "cloud"

[[models]]
name = "gpt-5-mini"
engine = "cloud"

[[benchmarks]]
name = "coding_assistant"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "security_scanner"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "daily_digest"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "doc_qa"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "browser_assistant"
backend = "jarvis-direct"
max_samples = 30
