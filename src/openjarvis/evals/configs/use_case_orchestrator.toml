# Orchestrator agent on 5 use-case benchmarks.
# Multi-turn tool-calling loop — OpenJarvis's flagship agent.

[meta]
name = "use-case-orchestrator"
description = "Use-case benchmarks — OrchestratorAgent with tools"

[defaults]
temperature = 0.0
max_tokens = 2048

[judge]
model = "gpt-5-mini-2025-08-07"

[run]
max_workers = 4
output_dir = "results/use-cases-orchestrator/"
seed = 42

[[models]]
name = "qwen3:8b"
engine = "ollama"

[[benchmarks]]
name = "email_triage"
backend = "jarvis-agent"
agent = "orchestrator"
tools = ["think"]
max_samples = 30

[[benchmarks]]
name = "morning_brief"
backend = "jarvis-agent"
agent = "orchestrator"
tools = ["think", "web_search"]
max_samples = 15

[[benchmarks]]
name = "research_mining"
backend = "jarvis-agent"
agent = "orchestrator"
tools = ["think", "web_search"]
max_samples = 30

[[benchmarks]]
name = "knowledge_base"
backend = "jarvis-agent"
agent = "orchestrator"
tools = ["think"]
max_samples = 30

[[benchmarks]]
name = "coding_task"
backend = "jarvis-agent"
agent = "orchestrator"
tools = ["think", "code_interpreter"]
max_samples = 29
