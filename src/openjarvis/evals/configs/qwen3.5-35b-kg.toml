# Experiment 2: LifelongAgent KG on Qwen3.5-35B-A3B (smaller MoE)
# Compare against 122B-A10B on same 19 KG questions
# Uses port 8000 (Orhun's vLLM instance)

[meta]
name = "qwen3.5-35b-kg"
description = "LifelongAgent KG on Qwen3.5-35B-A3B for size comparison"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/qwen3.5-35b-kg/"
seed = 42
telemetry = true
gpu_metrics = true

[[models]]
name = "Qwen/Qwen3.5-35B-A3B-FP8"
engine = "vllm"
param_count_b = 35.0
active_params_b = 3.0
gpu_peak_tflops = 989.5
gpu_peak_bandwidth_gb_s = 3350.0
num_gpus = 4

[[benchmarks]]
name = "lifelong-agent"
backend = "jarvis-direct"
max_samples = 50
subset = "knowledge_graph"
