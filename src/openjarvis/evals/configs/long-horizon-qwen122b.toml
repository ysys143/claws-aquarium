# Long-horizon eval: Qwen3.5-122B-A10B-FP8 (vLLM port 8005)
# 4 benchmarks: GAIA, FRAMES, DeepPlanning, LifelongAgent KG

[meta]
name = "long-horizon-qwen122b"
description = "Long-horizon benchmarks on Qwen3.5-122B-A10B-FP8"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/long-horizon-qwen122b/"
seed = 42
telemetry = true
gpu_metrics = true

[[models]]
name = "Qwen/Qwen3.5-122B-A10B-FP8"
engine = "vllm"
param_count_b = 122.0
active_params_b = 10.0
gpu_peak_tflops = 989.5
gpu_peak_bandwidth_gb_s = 3350.0
num_gpus = 4

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]

[[benchmarks]]
name = "frames"
backend = "jarvis-direct"
max_samples = 50

[[benchmarks]]
name = "deepplanning"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["think", "calculator", "code_interpreter"]

[[benchmarks]]
name = "lifelong-agent"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
subset = "knowledge_graph"
tools = ["think", "calculator", "code_interpreter"]
