# Experiment 4: LifelongAgent KG with agentic backend (multi-turn reasoning)
# Compare against jarvis-direct (single call) — agent can reason step-by-step
# with think/calculator/code_interpreter tools

[meta]
name = "qwen3.5-122b-kg-agentic"
description = "LifelongAgent KG with monitor_operative agent for multi-turn reasoning"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096

[run]
max_workers = 1            # Sequential for agent state safety
output_dir = "results/qwen3.5-122b-kg-agentic/"
seed = 42
telemetry = true
gpu_metrics = true

[[models]]
name = "Qwen/Qwen3.5-122B-A10B-FP8"
engine = "vllm"
param_count_b = 122.0
active_params_b = 10.0
gpu_peak_tflops = 989.5
gpu_peak_bandwidth_gb_s = 3350.0
num_gpus = 4

[[benchmarks]]
name = "lifelong-agent"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
subset = "knowledge_graph"
tools = [
    "think", "calculator", "code_interpreter",
]
