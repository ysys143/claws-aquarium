# Baseline: direct engine inference (no agent) on 5 use-case benchmarks.
# Compare this against agent-backed configs to measure agent value-add.

[meta]
name = "use-case-direct-baseline"
description = "Use-case benchmarks — raw engine, no agent (baseline)"

[defaults]
temperature = 0.0
max_tokens = 2048

[judge]
model = "gpt-5-mini-2025-08-07"

[run]
max_workers = 4
output_dir = "results/use-cases-direct/"
seed = 42

[[models]]
name = "qwen3:8b"
engine = "ollama"

[[benchmarks]]
name = "email_triage"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "morning_brief"
backend = "jarvis-direct"
max_samples = 15

[[benchmarks]]
name = "research_mining"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "knowledge_base"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "coding_task"
backend = "jarvis-direct"
max_samples = 29
